---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cluster
  namespace: cloudnative-pg
spec:
  interval: 30m
  chart:
    spec:
      chart: cluster
      version: 0.1.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: postgresql.cnpg.io
              version: v1
              kind: Cluster
              name: cluster
            patch: |
              - op: add
                path: /spec/probes
                value:
                  readiness:
                    timeoutSeconds: 15
                    periodSeconds: 20
                    failureThreshold: 5
                  liveness:
                    timeoutSeconds: 15
                    periodSeconds: 20
                    failureThreshold: 5
  values:
    version:
      postgresql: "16"
    cluster:
      monitoring:
        enabled: true
      storage:
        storageClass: local-hostpath
      affinity:
        topologyKey: kubernetes.io/hostname
      initdb:
        database: miniflux-db
        owner: ${MINIFLUX_PG_USER}
        secret:
          name: miniflux-secret
