---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
spec:
  releaseName: zot
  chart:
    spec:
      chart: zot
      sourceRef:
        kind: HelmRepository
        name: project-zot
        namespace: flux-system
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  values:
    replicaCount: 1
    service:
      type: ClusterIP
      port: 5000
    persistence:
      enabled: true
    mountConfig: true
    configFiles:
      config.json: |-
        {
          "distSpecVersion": "1.1.0",
          "storage": {
            "rootDirectory": "/var/lib/registry",
            "dedupe": true
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000"
          },
          "log": {
            "level": "info"
          }
        }
