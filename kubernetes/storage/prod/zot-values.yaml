---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zot
  namespace: zot
spec:
  releaseName: zot
  chart:
    spec:
      chart: zot
      version: 0.1.121
      sourceRef:
        kind: HelmRepository
        name: project-zot
        namespace: flux-system
  values:
    persistence:
      storageClass: "ceph-block"
      size: "100Gi"
    ingress:
      enabled: true
      className: nginx-internal
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
      hosts:
        - host: registry.${name_service_dns_domain}
          paths:
            - path: /
              port: 5000
      tls:
        - secretName: zot-registry-tls
          hosts:
            - registry.${name_service_dns_domain}
    configFiles:
      config.json: |-
        {
          "distSpecVersion": "1.1.0",
          "storage": {
            "rootDirectory": "/var/lib/registry",
            "dedupe": true,
            "gc": true,
            "retention": {
              "policies": [
                {
                  "keepTags": [
                    {
                      "pulledWithin": "720h"
                    },
                    {
                      "pushedWithin": "720h"
                    }
                  ]
                }
              ]
            }
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000"
          },
          "log": {
            "level": "info"
          },
          "extensions": {
            "ui": {
              "enable": true
            },
            "search": {
              "enable": true
            },
            "sync": {
              "enable": true,
              "registries": [
                {
                  "urls": [
                    "https://registry-1.docker.io"
                  ],
                  "onDemand": true
                },
                {
                  "urls": [
                    "https://ghcr.io"
                  ],
                  "onDemand": true
                },
                {
                  "urls": [
                    "https://mcr.microsoft.com"
                  ],
                  "onDemand": true
                }
              ]
            }
          }
        }
