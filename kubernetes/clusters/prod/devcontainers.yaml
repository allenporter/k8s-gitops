---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: devcontainers
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/devcontainers/prod
  prune: true
  dependsOn:
  - name: flux-system
  - name: storage
  - name: network
