---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: prepuller
  namespace: devcontainers
spec:
  selector:
    matchLabels:
      name: prepuller
  template:
    metadata:
      labels:
        name: prepuller
    spec:
      initContainers:
      - name: python-3-14
        image: mcr.microsoft.com/devcontainers/python:3.14-bookworm
        command: ["/bin/sh", "-c", "echo 'Python 3.14 base image cached'"]
      - name: python-3-13
        image: mcr.microsoft.com/devcontainers/python:3.13-bookworm
        command: ["/bin/sh", "-c", "echo 'Python 3.13 base image cached'"]
      containers:
      - name: pause
        image: registry.k8s.io/pause:3.9
