---
apiVersion: v1
kind: Service
metadata:
  name: ws-ring-keypad
  namespace: devcontainers
  annotations:
    coredns.io/hostname: ws-ring-keypad.devcontainers.k8s.mrv.thebends.org
spec:
  type: LoadBalancer
  ports:
  - port: 22
    targetPort: 2222
    protocol: TCP
    name: ssh
  selector:
    app: ws-ring-keypad
