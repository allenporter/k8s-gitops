---
apiVersion: v1
kind: Pod
metadata:
  name: ws-ring-keypad
  namespace: devcontainers
  labels:
    app: ws-ring-keypad
spec:
  containers:
  - name: workspace
    image: registry.k8s.mrv.thebends.org/devcontainers/home-assistant-ring-keypad:latest
    workingDir: /workspaces/home-assistant-ring-keypad
    command: ["/bin/sh", "-c"]
    args:
    - |
        sudo /usr/sbin/sshd -D -p 2222
    lifecycle:
      postStart:
        exec:
          command: ["/bin/sh", "-c", "devcontainer run-user-commands --workspace-folder /workspaces/home-assistant-ring-keypad"]
    volumeMounts:
    - name: workspace-volume
      mountPath: /workspaces/home-assistant-ring-keypad
    - name: ssh-keys
      mountPath: /home/vscode/.ssh/authorized_keys
      subPath: authorized_keys
      readOnly: true
  volumes:
  - name: workspace-volume
    persistentVolumeClaim:
      claimName: ws-ring-keypad-pvc
  - name: ssh-keys
    secret:
      secretName: ssh-public-keys
      defaultMode: 0o600
