---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-ring-keypad
  namespace: devcontainers
  labels:
    app: ws-ring-keypad
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ws-ring-keypad
  template:
    metadata:
      labels:
        app: ws-ring-keypad
    spec:
      containers:
      - name: workspace
        image: mcr.microsoft.com/devcontainers/python:3.14-bookworm
        workingDir: /workspaces/home-assistant-ring-keypad
        command: ["/bin/sh", "-c"]
        args:
        - |
            if ! command -v sshd >/dev/null 2>&1; then
              echo "sshd not found. Installing openssh-server..."
              sudo apt-get update && sudo apt-get install -y openssh-server
            fi
            sudo mkdir -p /home/vscode/.ssh
            sudo cp /tmp/ssh-keys/authorized_keys /home/vscode/.ssh/authorized_keys
            sudo chown -R vscode:vscode /home/vscode/.ssh
            sudo chmod 700 /home/vscode/.ssh
            sudo chmod 600 /home/vscode/.ssh/authorized_keys
            sudo chown -R vscode:vscode /workspaces
            sudo ssh-keygen -A
            sudo mkdir -p /var/run/sshd
            sudo /usr/sbin/sshd -D -p 2222
        env:
        - name: GIT_REPOSITORY_URL
          value: "https://github.com/allenporter/home-assistant-ring-keypad.git"
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                (
                  if [ -n "$GIT_REPOSITORY_URL" ] && [ ! -d /workspaces/home-assistant-ring-keypad/.git ]; then
                    echo "Cloning $GIT_REPOSITORY_URL..."
                    git clone "$GIT_REPOSITORY_URL" /workspaces/home-assistant-ring-keypad || true
                    chown -R vscode:vscode /workspaces/home-assistant-ring-keypad
                  fi
                  if ! command -v devcontainer >/dev/null 2>&1; then
                    echo "Installing Node.js and NPM..."
                    apt-get update && apt-get install -y nodejs npm
                    echo "Installing devcontainer CLI..."
                    npm install -g @devcontainers/cli || true
                  fi
                  while [ ! -f /workspaces/home-assistant-ring-keypad/.devcontainer/devcontainer.json ]; do
                    sleep 10
                  done
                  echo "devcontainer.json found! Running user commands..."
                  devcontainer run-user-commands --workspace-folder /workspaces/home-assistant-ring-keypad
                ) >/tmp/devcontainer-init.log 2>&1 &
        volumeMounts:
        - name: workspace-volume
          mountPath: /workspaces/home-assistant-ring-keypad
        - name: ssh-keys
          mountPath: /tmp/ssh-keys
          readOnly: true
      volumes:
      - name: workspace-volume
        persistentVolumeClaim:
          claimName: ws-ring-keypad-pvc
      - name: ssh-keys
        secret:
          secretName: ssh-public-keys
          defaultMode: 0o600
