---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pyrainbird
  namespace: devcontainers
spec:
  wait: false
  releaseName: pyrainbird
  chart:
    spec:
      chart: ./kubernetes/devcontainers/charts/devcontainer-workspace
      interval: 30m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 5m
  install:
    wait: false
    remediation:
      retries: 3
  upgrade:
    wait: false
  values:
    workspaceName: pyrainbird
    git:
      url: https://github.com/allenporter/pyrainbird.git
      directory: pyrainbird
    storage:
      size: 10Gi
    image:
      tag: latest
    builder:
      enabled: true
