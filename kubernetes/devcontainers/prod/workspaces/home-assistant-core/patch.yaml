---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-temp
spec:
  selector:
    matchLabels:
      app: ha-core-workspace-temp
  template:
    metadata:
      labels:
        app: ha-core-workspace-temp
    spec:
      containers:
      - name: workspace
        image: mcr.microsoft.com/devcontainers/python:3.14-bookworm
        workingDir: /workspaces/home-assistant-core
        args:
        - |
            if ! command -v sshd >/dev/null 2>&1; then
              echo "sshd not found. Installing openssh-server..."
              sudo apt-get update && sudo apt-get install -y openssh-server
            fi
            sudo mkdir -p /home/vscode/.ssh
            sudo cp /tmp/ssh-keys/authorized_keys /home/vscode/.ssh/authorized_keys
            sudo chown -R vscode:vscode /home/vscode/.ssh
            sudo chmod 700 /home/vscode/.ssh
            sudo chmod 600 /home/vscode/.ssh/authorized_keys
            sudo chown -R vscode:vscode /workspaces
            sudo ssh-keygen -A
            sudo mkdir -p /var/run/sshd
            sudo /usr/sbin/sshd -D -p 2222
        env:
        - name: GIT_REPOSITORY_URL
          value: "https://github.com/home-assistant/core.git"
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                (
                  if [ -n "$GIT_REPOSITORY_URL" ] && [ ! -d /workspaces/home-assistant-core/.git ]; then
                    echo "Cloning $GIT_REPOSITORY_URL..."
                    git clone "$GIT_REPOSITORY_URL" /workspaces/home-assistant-core || true
                  fi
                  if ! command -v devcontainer >/dev/null 2>&1; then
                    echo "Installing devcontainer CLI..."
                    npm install -g @devcontainers/cli || true
                  fi
                  while [ ! -f /workspaces/home-assistant-core/.devcontainer/devcontainer.json ]; do
                    sleep 10
                  done
                  echo "devcontainer.json found! Running user commands..."
                  devcontainer run-user-commands --workspace-folder /workspaces/home-assistant-core
                ) >/tmp/devcontainer-init.log 2>&1 &
        volumeMounts:
        - name: workspace-volume
          mountPath: /workspaces/home-assistant-core
        - name: ssh-keys
          mountPath: /tmp/ssh-keys
          readOnly: true

---
apiVersion: v1
kind: Service
metadata:
  name: workspace-temp-service
  annotations:
    coredns.io/hostname: home-assistant-core.devcontainers.k8s.mrv.thebends.org
spec:
  selector:
    app: ha-core-workspace-temp
