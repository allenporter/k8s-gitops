---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-journal-assistant
  namespace: devcontainers
  labels:
    app: ws-journal-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ws-journal-assistant
  template:
    metadata:
      labels:
        app: ws-journal-assistant
    spec:
      containers:
      - name: workspace
        image: registry.k8s.mrv.thebends.org/devcontainers/home-assistant-journal-assistant:latest
        workingDir: /workspaces/home-assistant-journal-assistant
        command: ["/bin/sh", "-c"]
        args:
        - |
            sudo mkdir -p /home/vscode/.ssh
            sudo cp /tmp/ssh-keys/authorized_keys /home/vscode/.ssh/authorized_keys
            sudo chown -R vscode:vscode /home/vscode/.ssh
            sudo chmod 700 /home/vscode/.ssh
            sudo chmod 600 /home/vscode/.ssh/authorized_keys
            sudo chown -R vscode:vscode /workspaces
            sudo ssh-keygen -A
            sudo mkdir -p /var/run/sshd
            sudo /usr/sbin/sshd -D -p 2222
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                if [ ! -d /workspaces/home-assistant-journal-assistant/.git ]; then
                  echo "Cloning..."
                  git clone https://github.com/allenporter/home-assistant-journal-assistant.git /workspaces/home-assistant-journal-assistant
                  chown -R vscode:vscode /workspaces/home-assistant-journal-assistant
                fi
        volumeMounts:
        - name: workspace-volume
          mountPath: /workspaces/home-assistant-journal-assistant
        - name: ssh-keys
          mountPath: /tmp/ssh-keys
          readOnly: true
      volumes:
      - name: workspace-volume
        persistentVolumeClaim:
          claimName: ws-journal-assistant-pvc
      - name: ssh-keys
        secret:
          secretName: ssh-public-keys
          defaultMode: 0o600
