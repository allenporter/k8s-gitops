---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ring-keypad
  namespace: devcontainers
spec:
  wait: false
  releaseName: ring-keypad
  chart:
    spec:
      chart: ./kubernetes/devcontainers/charts/devcontainer-workspace
      interval: 30m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 5m
  install:
    remediation:
      retries: 3
  values:
    workspaceName: ring-keypad
    git:
      url: https://github.com/allenporter/home-assistant-ring-keypad.git
      directory: home-assistant-ring-keypad
    storage:
      size: 10Gi
    image:
      tag: latest
    builder:
      enabled: true
