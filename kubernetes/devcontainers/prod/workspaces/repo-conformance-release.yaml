---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: repo-conformance
  namespace: devcontainers
spec:
  releaseName: repo-conformance
  chart:
    spec:
      chart: ./kubernetes/devcontainers/charts/devcontainer-workspace
      interval: 30m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 5m
  install:
    remediation:
      retries: 3
  values:
    workspaceName: repo-conformance
    git:
      url: https://github.com/allenporter/repo-conformance.git
      directory: repo-conformance
    storage:
      size: 10Gi
    image:
      tag: latest
    builder:
      enabled: true
