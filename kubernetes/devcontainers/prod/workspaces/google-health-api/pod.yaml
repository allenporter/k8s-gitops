---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-google-health-api
  namespace: devcontainers
  labels:
    app: ws-google-health-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ws-google-health-api
  template:
    metadata:
      labels:
        app: ws-google-health-api
    spec:
      containers:
      - name: workspace
        image: mcr.microsoft.com/devcontainers/python:3.14-bookworm
        workingDir: /workspaces/python-google-health-api
        command: ["/bin/sh", "-c"]
        args:
        - |
            if ! command -v sshd >/dev/null 2>&1 || ! command -v node >/dev/null 2>&1; then
              sudo apt-get update
            fi
            if ! command -v sshd >/dev/null 2>&1; then
              echo "sshd not found. Installing openssh-server..."
              sudo apt-get install -y openssh-server
            fi
            if ! command -v node >/dev/null 2>&1; then
              echo "Installing Node.js..."
              sudo apt-get install -y nodejs
            fi
            sudo mkdir -p /home/vscode/.ssh
            sudo cp /tmp/ssh-keys/authorized_keys /home/vscode/.ssh/authorized_keys
            sudo chown -R vscode:vscode /home/vscode/.ssh
            sudo chmod 700 /home/vscode/.ssh
            sudo chmod 600 /home/vscode/.ssh/authorized_keys
            sudo chown -R vscode:vscode /workspaces
            sudo ssh-keygen -A
            sudo mkdir -p /var/run/sshd

            # Write devcontainer lifecycle hooks runner script
            sudo cat << 'EOF' > /usr/local/bin/run-devcontainer-hooks.js
            const fs = require('fs');
            const { execSync } = require('child_process');
            const path = require('path');

            const wsFolder = process.argv[2];
            if (!wsFolder) {
              console.error("Workspace folder not specified");
              process.exit(1);
            }

            const configPath = path.join(wsFolder, '.devcontainer', 'devcontainer.json');
            if (!fs.existsSync(configPath)) {
              console.log("No devcontainer.json found at: " + configPath);
              process.exit(0);
            }

            let content = fs.readFileSync(configPath, 'utf8');
            content = content.replace(/\/\*[\s\S]*?\*\/|([^\\:]|^)\/\/.*$/gm, '$1');

            let config;
            try {
              config = JSON.parse(content);
            } catch (e) {
              console.error("Failed to parse devcontainer.json: " + e.message);
              process.exit(1);
            }

            function runCmd(cmd) {
              if (!cmd) return;
              if (Array.isArray(cmd)) {
                cmd = cmd.join(' ');
              }
              console.log("Executing lifecycle command: " + cmd);
              const formattedCmd = cmd.replace(/\${containerWorkspaceFolder}/g, wsFolder)
                                      .replace(/\${localWorkspaceFolder}/g, wsFolder);
              try {
                execSync(formattedCmd, { stdio: 'inherit', cwd: wsFolder, shell: true });
              } catch (err) {
                console.error("Error executing command: " + cmd, err.message);
              }
            }

            runCmd(config.initializeCommand);
            runCmd(config.onCreateCommand);
            runCmd(config.updateContentCommand);
            runCmd(config.postCreateCommand);
            runCmd(config.postStartCommand);
            runCmd(config.postAttachCommand);
            EOF
            sudo chmod +x /usr/local/bin/run-devcontainer-hooks.js

            sudo /usr/sbin/sshd -D -p 2222
        env:
        - name: GIT_REPOSITORY_URL
          value: "https://github.com/allenporter/python-google-health-api.git"
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                (
                  if [ -n "$GIT_REPOSITORY_URL" ] && [ ! -d /workspaces/python-google-health-api/.git ]; then
                    echo "Cloning $GIT_REPOSITORY_URL..."
                    git clone "$GIT_REPOSITORY_URL" /workspaces/python-google-health-api || true
                    chown -R vscode:vscode /workspaces/python-google-health-api
                  fi
                  while [ ! -f /workspaces/python-google-health-api/.devcontainer/devcontainer.json ]; do
                    sleep 10
                  done
                  while ! command -v node >/dev/null 2>&1 || [ ! -f /usr/local/bin/run-devcontainer-hooks.js ]; do
                    sleep 2
                  done
                  echo "devcontainer.json found! Running user commands..."
                  node /usr/local/bin/run-devcontainer-hooks.js /workspaces/python-google-health-api
                ) >/tmp/devcontainer-init.log 2>&1 &
        volumeMounts:
        - name: workspace-volume
          mountPath: /workspaces/python-google-health-api
        - name: ssh-keys
          mountPath: /tmp/ssh-keys
          readOnly: true
      volumes:
      - name: workspace-volume
        persistentVolumeClaim:
          claimName: ws-google-health-api-pvc
      - name: ssh-keys
        secret:
          secretName: ssh-public-keys
          defaultMode: 0o600
