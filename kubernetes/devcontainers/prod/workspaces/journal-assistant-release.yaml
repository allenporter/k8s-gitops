---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: journal-assistant
  namespace: devcontainers
spec:
  releaseName: journal-assistant
  chart:
    spec:
      chart: ./kubernetes/devcontainers/charts/devcontainer-workspace
      interval: 30m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 5m
  install:
    remediation:
      retries: 3
  values:
    workspaceName: journal-assistant
    git:
      url: https://github.com/allenporter/home-assistant-journal-assistant.git
      directory: home-assistant-journal-assistant
    storage:
      size: 10Gi
    image:
      tag: latest
    builder:
      enabled: true
      cacheFrom:
        - registry.k8s.mrv.thebends.org/devcontainers/home-assistant-ring-keypad:latest
