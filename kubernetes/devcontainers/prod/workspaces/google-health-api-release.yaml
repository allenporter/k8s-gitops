---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: google-health-api
  namespace: devcontainers
spec:
  releaseName: google-health-api
  chart:
    spec:
      chart: ./kubernetes/devcontainers/charts/devcontainer-workspace
      interval: 30m
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  interval: 5m
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
  values:
    workspaceName: google-health-api
    git:
      url: https://github.com/allenporter/python-google-health-api.git
      directory: python-google-health-api
    storage:
      size: 10Gi
    image:
      tag: latest
    builder:
      enabled: true
