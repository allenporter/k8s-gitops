---
apiVersion: v1
kind: Service
metadata:
  name: ws-{{ .Values.workspaceName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    coredns.io/hostname: ws-{{ .Values.workspaceName }}.{{ .Values.global.domainSuffix }}
spec:
  type: LoadBalancer
  ports:
  - port: 22
    targetPort: {{ .Values.global.sshTargetPort }}
    protocol: TCP
    name: ssh
  selector:
    app: ws-{{ .Values.workspaceName }}
