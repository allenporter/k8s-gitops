---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-temp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: workspace-temp
  template:
    metadata:
      labels:
        app: workspace-temp
    spec:
      containers:
      - name: workspace
        image: mcr.microsoft.com/devcontainers/python:3.14-bookworm
        workingDir: /workspaces/temp
        command: ["/bin/sh", "-c"]
        args:
        - |
            if ! command -v sshd >/dev/null 2>&1; then
              echo "sshd not found. Installing openssh-server..."
              sudo apt-get update && sudo apt-get install -y openssh-server
            fi
            sudo mkdir -p /home/vscode/.ssh
            sudo cp /tmp/ssh-keys/authorized_keys /home/vscode/.ssh/authorized_keys
            sudo chown -R vscode:vscode /home/vscode/.ssh
            sudo chmod 700 /home/vscode/.ssh
            sudo chmod 600 /home/vscode/.ssh/authorized_keys
            sudo ssh-keygen -A
            sudo mkdir -p /var/run/sshd
            sudo /usr/sbin/sshd -D -p 2222
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                (
                  if ! command -v devcontainer >/dev/null 2>&1; then
                    echo "Installing devcontainer CLI..."
                    npm install -g @devcontainers/cli || true
                  fi
                  while [ ! -f /workspaces/temp/.devcontainer/devcontainer.json ]; do
                    sleep 10
                  done
                  echo "devcontainer.json found! Running user commands..."
                  devcontainer run-user-commands --workspace-folder /workspaces/temp
                ) >/tmp/devcontainer-init.log 2>&1 &
        volumeMounts:
        - name: workspace-volume
          mountPath: /workspaces/temp
        - name: ssh-keys
          mountPath: /tmp/ssh-keys
          readOnly: true
      volumes:
      - name: workspace-volume
        persistentVolumeClaim:
          claimName: workspace-pvc
      - name: ssh-keys
        secret:
          secretName: ssh-public-keys
          defaultMode: 0o600
