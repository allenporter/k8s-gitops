---
clusterName: k8s-cluster
talosVersion: v1.13.6
kubernetesVersion: v1.36.2
endpoint: https://10.10.101.1:6443
allowSchedulingOnMasters: true
allowSchedulingOnControlPlanes: true
nodes:
  - hostname: kapi01
    ipAddress: 10.10.100.1
    controlPlane: true
    installDisk: /dev/sda
    # /dev/sda
    # /dev/nvme0n1
  - hostname: kapi02
    ipAddress: 10.10.100.2
    controlPlane: true
    installDisk: /dev/sda
    # /dev/sda
    # /dev/nvme0n1
    nodeAnnotations:
      accelerator: intel
  - hostname: kapi03
    ipAddress: 10.10.100.3
    controlPlane: true
    installDisk: /dev/sda
    # /dev/sda
    # /dev/nvme0n1
    nodeAnnotations:
      accelerator: intel
  - hostname: kube01
    ipAddress: 10.10.100.4
    controlPlane: false
    installDisk: /dev/sda
    nodeAnnotations:
      accelerator: nvidia
    kernelModules:
      - name: nvidia
      - name: nvidia_uvm
      - name: nvidia_drm
      - name: nvidia_modeset
    schematic:
      customization:
        extraKernelArgs:
          - net.ifnames=0
        systemExtensions:
          officialExtensions:
            - siderolabs/nonfree-kmod-nvidia-lts
            - siderolabs/nvidia-container-toolkit-lts
    patches:
      - |-
        machine:
          sysctls:
            net.core.bpf_jit_harden: 1
      - |-
        machine:
          files:
            - content: |
                [plugins."io.containerd.cri.v1.runtime"]
                  default_runtime_name = "nvidia"
                [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.nvidia]
                  runtime_type = "io.containerd.runc.v2"
                  [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.nvidia.options]
                    BinaryName = "/usr/local/bin/nvidia-container-runtime"
              path: /etc/cri/conf.d/20-customization.part
              op: create


cniConfig:
  name: none
controlPlane:
  networkInterfaces:
    - interface: eth0
      dhcp: true
      vip:
        ip: 10.10.101.1
  nodeAnnotations:
    accelerator: intel
  schematic:
    customization:
      extraKernelArgs:
        - net.ifnames=0
        - i915.force_probe=7d55
      # All control plane nodes have the same intel extensions
      systemExtensions:
        officialExtensions:
          - siderolabs/i915
          - siderolabs/intel-ice-firmware
          - siderolabs/intel-ucode

worker:
  networkInterfaces:
    - interface: eth0
      dhcp: true
  schematic:
    customization:
      extraKernelArgs:
        - net.ifnames=0

patches:
  - |-
     cluster:
       proxy:
         disabled: true
  - |-
     machine:
       registries:
         mirrors:
           docker.io:
             endpoints:
               - https://registry.k8s.mrv.thebends.org
               - https://registry-1.docker.io
           ghcr.io:
             endpoints:
               - https://registry.k8s.mrv.thebends.org
               - https://ghcr.io
           mcr.microsoft.com:
             endpoints:
               - https://registry.k8s.mrv.thebends.org
               - https://mcr.microsoft.com
